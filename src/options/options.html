<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authenticity Notes — Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options">
      <h1>Authenticity Notes — Settings</h1>

      <form class="options__form" id="form">
        <label class="options__field">
          <span>Sensitivity threshold — <output id="sensitivityValue">70</output>%</span>
          <input type="range" id="sensitivity" min="0" max="100" step="1" value="70" />
          <small class="options__hint"
            >Only surface a card when a post scores at least this AI-likelihood. Lower is more
            sensitive (more cards).</small
          >
        </label>

        <label class="options__field">
          <span>Detection provider API key</span>
          <input
            type="password"
            id="apiKey"
            autocomplete="off"
            placeholder="Stored locally, never in code"
          />
          <small class="options__hint"
            >Used for the Stage-2 deep check. Kept in your browser storage; never hardcoded in the
            extension.</small
          >
        </label>

        <label class="options__field options__field--inline">
          <input type="checkbox" id="onDemand" />
          <span>On-demand scanning (instead of automatic)</span>
        </label>
      </form>

      <p class="options__status" id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
