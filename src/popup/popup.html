<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authenticity Notes</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1 class="popup__title">Authenticity Notes</h1>
      <p class="popup__subtitle">AI-generation context for LinkedIn posts.</p>

      <label class="popup__toggle">
        <input type="checkbox" id="enabled" class="popup__checkbox" />
        <span>Analyze posts as I scroll</span>
      </label>

      <div class="popup__row">
        <span class="popup__row-label">Theme</span>
        <div class="popup__seg" id="theme" role="group" aria-label="Theme">
          <button type="button" class="popup__seg-btn" data-theme="auto">Auto</button>
          <button type="button" class="popup__seg-btn" data-theme="light">Light</button>
          <button type="button" class="popup__seg-btn" data-theme="dark">Dark</button>
        </div>
      </div>

      <button type="button" id="scan" class="popup__button">Scan visible posts now</button>

      <button type="button" id="options" class="popup__link">Settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
